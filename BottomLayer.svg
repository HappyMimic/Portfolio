<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svgfile [
    <!ENTITY topmost "100">
    <!ENTITY layer1 "500"> <!--100 + topmost -->
    <!ENTITY layer1curve "550"> <!--100 + topmost + curve of 50-->
    <!ENTITY layer2 "425"> <!--400 + topmost -->
    <!ENTITY layer2curve "475"> <!--400 + topmost + curve of 50-->
    <!ENTITY layer3 "350"> <!--300 + topmost -->
    <!ENTITY layer3curve "400"> <!--300 + topmost + curve of 50-->
    <!ENTITY layer4 "275"> <!--200 + topmost -->
    <!ENTITY layer4curve "325"> <!--200 + topmost + curve of 50-->
    <!ENTITY layer5 "200"> <!--100 + topmost -->
    <!ENTITY layer5curve "250"> <!--100 + topmost + curve of 50-->
]>
<svg id="layers"
  viewBox="0, 0 1100, 525"
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink">
    <g class="row">
        <path id="layer1" class="duck" d="M 0, &topmost;
            L 0, &layer1;
            Q 50, &layer1curve; 200, &layer1;
            T 400, &layer1; 600, &layer1; 800, &layer1; 1000, &layer1; 1200, &layer1;
            L 1200, &topmost;
            Z" 
            fill="#00A6AB"
        />
        <path id="layer2" class="duck" d="M 0, &topmost;
            L 0, &layer2;
            Q 50, &layer2curve; 200, &layer2;
            T 400, &layer2; 600, &layer2; 800, &layer2; 1000, &layer2; 1200, &layer2;
            L 1200, &topmost;
            Z" 
            fill="#00c9a7"
        />
        <path class="duck" d="M -50, 0
            L -50, 250
            Q 25, 300 100, 250
            T 250, 250 400, 250 550, 250 700, 250 850, 250 1000, 250 1150, 250
            L 1150, 0
            Z" 
            fill="#66D79B"
        />
        <path class="duck" d="M -12.5, 0
            L -12.5, 175
            Q 50, 225 112.5, 175
            T 237.5, 175 359.5, 175 487.5, 175 612.5, 175 737.5, 175 859.5, 175 987.5, 175 1112.5, 175
            L 1125, 0
            Z" 
            fill="#9CE492"
        />
        <path class="duck" d="M 0, 0
            L 0, 100
            Q 50, 150 100, 100
            T 200, 100 300, 100 400, 100 500, 100 600, 100 700, 100 800, 100 900, 100 1000, 100 1100, 100
            L 1100, 0
            Z" 
            fill="#CDEE8F"
        /> 
    </g>
</svg>